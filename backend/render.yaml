services:
  - type: web
    name: fifa-champ-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-champ-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: fifa-champ-db
    plan: free
